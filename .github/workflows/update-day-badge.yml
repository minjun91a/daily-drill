name: Update Day badge

# days/ 안의 .md 파일이 추가/삭제될 때마다 실행 → README의 Day 배지 숫자를 자동 갱신
on:
  push:
    branches: [main]
    paths:
      - "days/**.md"

permissions:
  contents: write   # README를 커밋해 되돌려 쓰기 위해 필요

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Count day files and update README badge
        run: |
          # days/ 안의 .md 파일 개수 = Day 수
          COUNT=$(find days -maxdepth 1 -name '*.md' | wc -l | tr -d ' ')
          echo "Day count: $COUNT"

          # 배지 URL의 Day-<숫자>- 부분만 교체
          sed -i -E "s|badge/Day-[0-9]+-|badge/Day-${COUNT}-|" README.md

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "배지 변화 없음 — 커밋 생략"
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: Day 배지 자동 갱신 [skip ci]"
            git push
          fi
